<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Sfondo sfumato blu-navy -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A3F6F;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0E2A50;stop-opacity:1"/>
    </linearGradient>
    <!-- Sfumatura dorata per il badge €  -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD166;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#F4A521;stop-opacity:1"/>
    </linearGradient>
    <!-- Ombra edificio -->
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Sfondo arrotondato -->
  <rect width="256" height="256" rx="44" fill="url(#bgGrad)"/>

  <!-- =============================================
       EDIFICIO PRINCIPALE (torre centrale)
       ============================================= -->
  <g filter="url(#shadow)">

    <!-- Corpo principale torre -->
    <rect x="82" y="58" width="92" height="148" rx="4" fill="#2E6DB4"/>

    <!-- Cornicione tetto -->
    <rect x="76" y="52" width="104" height="14" rx="3" fill="#3A7CC9"/>

    <!-- Antennina sul tetto -->
    <rect x="124" y="34" width="8" height="22" rx="2" fill="#3A7CC9"/>
    <circle cx="128" cy="32" r="5" fill="#5BA3E8"/>

    <!-- Facciata: griglia finestre (bianche, con leggero riflesso) -->
    <!-- Riga 1 -->
    <rect x="96"  y="74" width="18" height="16" rx="2" fill="white" opacity="0.92"/>
    <rect x="121" y="74" width="18" height="16" rx="2" fill="white" opacity="0.92"/>
    <rect x="146" y="74" width="18" height="16" rx="2" fill="white" opacity="0.92"/>

    <!-- Riga 2 -->
    <rect x="96"  y="100" width="18" height="16" rx="2" fill="white" opacity="0.92"/>
    <rect x="121" y="100" width="18" height="16" rx="2" fill="white" opacity="0.92"/>
    <rect x="146" y="100" width="18" height="16" rx="2" fill="white" opacity="0.92"/>

    <!-- Riga 3 -->
    <rect x="96"  y="126" width="18" height="16" rx="2" fill="white" opacity="0.92"/>
    <rect x="121" y="126" width="18" height="16" rx="2" fill="white" opacity="0.92"/>
    <rect x="146" y="126" width="18" height="16" rx="2" fill="white" opacity="0.92"/>

    <!-- Porta d'ingresso (arco) -->
    <rect x="115" y="167" width="26" height="39" rx="13 13 2 2" fill="#1A3F6F"/>
    <!-- Lucina sopra la porta -->
    <ellipse cx="128" cy="163" rx="8" ry="5" fill="#FFD166" opacity="0.8"/>

    <!-- Gradino soglia -->
    <rect x="108" y="203" width="40" height="5" rx="2" fill="#4A8AC7"/>

    <!-- Edificio basso a sinistra (profondità) -->
    <rect x="28" y="120" width="58" height="86" rx="3" fill="#24578F" opacity="0.85"/>
    <!-- Finestre edificio sx -->
    <rect x="38" y="134" width="14" height="12" rx="2" fill="white" opacity="0.70"/>
    <rect x="58" y="134" width="14" height="12" rx="2" fill="white" opacity="0.70"/>
    <rect x="38" y="156" width="14" height="12" rx="2" fill="white" opacity="0.70"/>
    <rect x="58" y="156" width="14" height="12" rx="2" fill="white" opacity="0.70"/>
    <rect x="38" y="178" width="14" height="12" rx="2" fill="white" opacity="0.70"/>
    <rect x="58" y="178" width="14" height="12" rx="2" fill="white" opacity="0.70"/>

    <!-- Edificio basso a destra (profondità) -->
    <rect x="170" y="128" width="58" height="78" rx="3" fill="#24578F" opacity="0.85"/>
    <!-- Finestre edificio dx -->
    <rect x="180" y="142" width="14" height="12" rx="2" fill="white" opacity="0.70"/>
    <rect x="200" y="142" width="14" height="12" rx="2" fill="white" opacity="0.70"/>
    <rect x="180" y="164" width="14" height="12" rx="2" fill="white" opacity="0.70"/>
    <rect x="200" y="164" width="14" height="12" rx="2" fill="white" opacity="0.70"/>
    <rect x="180" y="186" width="14" height="12" rx="2" fill="white" opacity="0.70"/>
    <rect x="200" y="186" width="14" height="12" rx="2" fill="white" opacity="0.70"/>

  </g>

  <!-- =============================================
       BADGE PAGAMENTO (cerchio dorato con €)
       Posizionato in basso a destra
       ============================================= -->
  <circle cx="194" cy="194" r="38" fill="#0E2A50" opacity="0.5"/>
  <circle cx="194" cy="194" r="34" fill="url(#goldGrad)"/>
  <!-- Segno € in blu scuro all'interno del badge -->
  <text x="194" y="206"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="38"
        font-weight="bold"
        fill="#1A3F6F"
        text-anchor="middle">€</text>

  <!-- Linea base / strada -->
  <rect x="20" y="206" width="216" height="6" rx="3" fill="#2E6DB4" opacity="0.5"/>

</svg>
